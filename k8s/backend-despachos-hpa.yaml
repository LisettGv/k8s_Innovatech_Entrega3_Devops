apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: innovatech-despachos-hpa
  namespace: innovatech
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: innovatech-backend # Vincula este HPA al deployment de Despachos
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
          