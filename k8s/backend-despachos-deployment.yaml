apiVersion: apps/v1
kind: Deployment
metadata:
  name: innovatech-backend
  namespace: innovatech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: innovatech-backend
  template:
    metadata:
      labels:
        app: innovatech-backend
    spec:
      containers:
        - name: backend
          # Recuerda verificar que el ID de cuenta de AWS y el nombre del repositorio ECR coincidan con los tuyos
          image: 587188089348.dkr.ecr.us-east-1.amazonaws.com/innovatech-backend:eks-v1 
          ports:
            - containerPort: 3001
          env:
            - name: DB_HOST
              value: "innovatech-db"
            - name: DB_USER
              value: "root"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: DB_NAME
              value: "innovatech_db"
            - name: DB_PORT
              value: "3306"

          # Se agrega Resource para que Metrics Server calcule el % de CPU y Memoria para escalar 
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # HEALTH CHECKS (PROBES)
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10