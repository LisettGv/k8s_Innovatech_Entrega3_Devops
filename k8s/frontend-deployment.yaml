apiVersion: apps/v1
kind: Deployment
metadata:
  name: innovatech-frontend
  namespace: innovatech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: innovatech-frontend
  template:
    metadata:
      labels:
        app: innovatech-frontend
    spec:
      containers:
        - name: frontend
          # Asegúrate de que el nombre del repositorio en ECR corresponda a tu frontend
          image: 114680401577.dkr.ecr.us-east-1.amazonaws.com/innovatech-frontend:eks-v1
          ports:
            - containerPort: 80

          # Se agrega Resource para que Metrics Server calcule el % de CPU y Memoria para escalar 
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"

          # HEALTH CHECKS
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10