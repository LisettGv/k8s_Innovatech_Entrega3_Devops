apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: innovatech-frontend-hpa
  namespace: innovatech
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: innovatech-frontend # Vinculado al despliegue del frontend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
          