apiVersion: v1
kind: Service
metadata:
  name: innovatech-ventas-service
  namespace: innovatech
spec:
  selector:
    app: innovatech-ventas # Apunta exactamente al label del Deployment de Ventas
  ports:
    - port: 8080       # Puerto por el que se accederá dentro del clúster
      targetPort: 8080 # Puerto real donde escucha Spring Boot en el contenedor
  type: ClusterIP
  