apiVersion: v1
kind: Service
metadata:
  name: innovatech-despachos-service
  namespace: innovatech
spec:
  selector:
    app: innovatech-backend # Apunta exactamente al label del Deployment de Despachos
  ports:
    - port: 3001       # Puerto de acceso interno dentro del clúster
      targetPort: 3001 # Puerto real donde escucha tu app de Despachos
  type: ClusterIP
  